<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mayfan Portfolio</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

html, body {
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
}

.container {
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

/* SCENES */
section {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  transition: transform 1s cubic-bezier(0.77,0,0.175,1), opacity 1s ease;
  z-index: 1;
}

section.active {
  z-index: 5;
}

/* MEDIA */
video, img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.8);
}

/* TEXT */
.hero-content {
  text-align:center;
}

.hero h1 {
  font-size:64px;
  letter-spacing:4px;
}

.hero p {
  margin-top:10px;
  color:#ccc;
}

.project-content {
  position:absolute;
  bottom:60px;
  left:60px;
  max-width:500px;
  z-index:10;
}

.links a {
  color:#4da6ff;
  text-decoration:none;
  margin-right:15px;
}

/* CAMERA STATES */
.active { transform: translateY(0) scale(1); opacity:1; }
.above { transform: translateY(-100%) scale(0.92); opacity:0; }
.below { transform: translateY(100%) scale(1.08); opacity:0; }

/* TIMELINE */
.video-controls {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  opacity: 0;
  transition: 0.3s;
  pointer-events: none;
  z-index: 50;
}

.video-controls.active {
  opacity: 1;
  pointer-events: auto;
}

#timeline {
  width:100%;
}

/* MULTI VIDEO */
.multi-video {
  position: relative;
}

.vid {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;

  opacity:0;
  transition: opacity 0.5s ease;
  pointer-events:none;
}

.vid.active {
  opacity:1;
  pointer-events:auto;
  z-index:2;
}

/* ARROWS */
.nav-arrow {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:60px;
  color:white;
  cursor:pointer;
  opacity:0;
  transition:0.3s;
  padding:20px;
  user-select:none;
  z-index:20;
}

.nav-arrow.left { left:20px; }
.nav-arrow.right { right:20px; }

.multi-video:hover .nav-arrow {
  opacity:0.5;
}

.nav-arrow:hover {
  opacity:1;
}

/* DOTS */
.nav-dots{
  position:fixed;
  right:20px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:999;
}

.nav-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#555;
  cursor:pointer;
  transition:0.3s;
}

.nav-dot.active{
  width:16px;
  height:16px;
  background:#fff;
}

</style>
</head>

<body>

<div class="container">

<!-- HERO -->
<section class="hero active">

  <video autoplay muted loop playsinline>
    <source src="videos/hero.mp4" type="video/mp4">
  </video>

  <!-- LANDING IMAGE -->
  <img class="landing-img" src="tbrender_Main Camera_007.png" alt="Landing"/>

  <div class="hero-content">
    <h1>MEI YIFAN</h1>
    <p>3D Artist • Game Visual Designer</p>
  </div>

</section>

<!-- PROJECT 1 -->
<section class="project below">
  <video autoplay muted loop playsinline>
    <source src="medival/16_MeiYiFan_v-capture.mp4">
  </video>

  <div class="project-content">
    <h2>Medieval Hall</h2>
    <p>Lighting-driven environment focused on mood.</p>

    <div class="links">
      <a href="medival/medieval-breakdown.pdf" target="_blank">Breakdown</a>
    </div>
  </div>
</section>

<!-- PROJECT 2 (FIXED) -->
<section class="project below">
  <video autoplay muted loop playsinline>
    <source src="scifi/16_meiYifan_buildVid (1)2.mp4">
  </video>

  <div class="project-content">
    <h2>Sci Fi Corridor</h2>
    <p>Storytelling through space and environment.</p>

    <div class="links">
      <a href="scifi/scifi-breakdown.pdf" target="_blank">Breakdown</a>
    </div>
  </div>
</section>

<!-- PROJECT 3 -->
<section class="project below">
  <video autoplay muted loop playsinline>
    <source src="3de/3dde.mp4">
  </video>

  <div class="project-content">
    <h2>The Island</h2>
    <p>level design.</p>

  </div>
</section>

<!-- PROJECT 4 -->
<section class="project below multi-video">

  <video class="vid active" autoplay muted loop playsinline>
    <source src="3cc/13_meiYifan_CLWK4.mp4">
  </video>

  <video class="vid" muted loop playsinline>
    <source src="3cc/Video Project 2.mp4">
  </video>

  <div class="nav-arrow left">‹</div>
  <div class="nav-arrow right">›</div>

  <div class="project-content">
    <h2>YinYang Girl</h2>
    <p>Character design exploration.</p>

    <div class="links">
      <a href="3cc/process.pdf" target="_blank">Design process</a>
    </div>
  </div>

</section>

</div>

<!-- TIMELINE -->
<div class="video-controls" id="controls">
  <input type="range" id="timeline" min="0" max="100" value="0">
</div>

<!-- DOTS -->
<div class="nav-dots" id="navDots"></div>

<script>

let index = 0;
let isAnimating = false;

const sections = document.querySelectorAll("section");
const controls = document.getElementById("controls");
const timeline = document.getElementById("timeline");

let currentVideo = null;

/* =========================
   ACTIVE VIDEO
========================= */
function setActiveVideo(){
  const s = sections[index];
  if(!s) return;

  const multi = s.querySelector(".multi-video");
  currentVideo = multi ? multi.querySelector(".vid.active") : s.querySelector("video");
}

/* =========================
   SCENES
========================= */
function updateScenes(){

  sections.forEach((s,i)=>{
    s.classList.remove("active","above","below");

    if(i < index) s.classList.add("above");
    else if(i === index) s.classList.add("active");
    else s.classList.add("below");
  });

  setActiveVideo();

  if(currentVideo){
    currentVideo.currentTime = 0;
    timeline.value = 0;
  }

  syncDots();
}

/* =========================
   SCROLL
========================= */
window.addEventListener("wheel",(e)=>{

  if(isAnimating) return;
  isAnimating = true;

  if(e.deltaY > 0){
    index = Math.min(index+1, sections.length-1);
  } else {
    index = Math.max(index-1, 0);
  }

  updateScenes();

  setTimeout(()=>isAnimating=false,900);
});

/* =========================
   TIMELINE SHOW
========================= */
document.addEventListener("mousemove",(e)=>{
  if(window.innerHeight - e.clientY < 120){
    controls.classList.add("active");
  } else {
    controls.classList.remove("active");
  }
});

/* =========================
   TIMELINE SYNC (FIXED)
========================= */
setInterval(()=>{

  if(!currentVideo || !currentVideo.duration) return;

  timeline.value =
    (currentVideo.currentTime / currentVideo.duration) * 100;

},80);

/* SCRUB */
timeline.addEventListener("input",()=>{

  if(!currentVideo || !currentVideo.duration) return;

  currentVideo.currentTime =
    (timeline.value / 100) * currentVideo.duration;

});

/* =========================
   PLAY / PAUSE FIX
========================= */
document.querySelectorAll("video").forEach(v=>{
  v.addEventListener("click",()=>{

    if(v.paused){
      v.play();
    } else {
      v.pause();
    }

  });
});

/* =========================
   MULTI VIDEO SWITCH
========================= */
document.querySelectorAll(".multi-video").forEach(section=>{

  const vids = section.querySelectorAll(".vid");
  const left = section.querySelector(".nav-arrow.left");
  const right = section.querySelector(".nav-arrow.right");

  let i = 0;

  function switchVideo(n){

    vids.forEach(v=>{
      v.classList.remove("active");
      v.pause();
    });

    i = n;

    const v = vids[i];
    v.classList.add("active");

    v.currentTime = 0;

    currentVideo = v;
    timeline.value = 0;

    v.play().catch(()=>{
      v.muted = true;
      v.play();
    });
  }

  right?.addEventListener("click",(e)=>{
    e.stopPropagation();
    switchVideo(1);
  });

  left?.addEventListener("click",(e)=>{
    e.stopPropagation();
    switchVideo(0);
  });

});

/* =========================
   DOT SYSTEM (SAFE FIX)
========================= */
const nav = document.getElementById("navDots");

function buildDots(){

  if(!nav) return;

  nav.innerHTML = "";

  sections.forEach((_,i)=>{
    const d = document.createElement("div");
    d.className = "nav-dot";

    d.onclick = ()=>{
      index = i;
      updateScenes();
    };

    nav.appendChild(d);
  });

}

function syncDots(){

  if(!nav) return;

  nav.querySelectorAll(".nav-dot")
    .forEach((d,i)=>{
      d.classList.toggle("active", i === index);
    });

}

buildDots();
syncDots();

</script>

</body>
</html>
