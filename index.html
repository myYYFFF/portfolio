<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinematic Portfolio</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }

    html, body {
      height:100%;
      overflow:hidden;
      background:#000;
      color:#fff;
    }

    .container {
      position:fixed;
      width:100%;
      height:100%;
      top:0;
      left:0;
    }

    section {
      position:absolute;
      width:100%;
      height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      transition: transform 1s cubic-bezier(0.77,0,0.175,1), opacity 1s ease;
    }

    .hero video, .project video, .project img {
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-1;
      filter:brightness(0.6);
    }

    .hero-content { text-align:center; }
    .hero h1 { font-size:64px; letter-spacing:4px; }
    .hero p { margin-top:10px; color:#ccc; }

    .project-content {
      position:absolute;
      bottom:60px;
      left:60px;
      max-width:500px;
    }

    .links a {
      color:#4da6ff;
      margin-right:15px;
      text-decoration:none;
    }

    /* CAMERA STATES */
    .active { transform: translateY(0) scale(1); opacity:1; z-index:2; }
    .above { transform: translateY(-100%) scale(0.92); opacity:0; }
    .below { transform: translateY(100%) scale(1.08); opacity:0; }

    /* VIDEO CONTROL BAR */
    .video-controls {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .video-controls.active {
      opacity: 1;
      pointer-events: auto;
    }

    #timeline {
      width: 100%;
    }

  </style>
</head>
<body>

<div class="container">

  <section class="hero active">
    <video autoplay muted loop playsinline>
      <source src="videos/hero.mp4" type="video/mp4" />
    </video>
    <div class="hero-content">
      <h1>MEI YIFAN</h1>
      <p>3D Artist • Game Visual Designer</p>
    </div>
  </section>

  <section class="project below">
    <video autoplay muted loop playsinline>
      <source src="medival/16_MeiYiFan_v-capture.mp4" type="video/mp4" />
    </video>
    <div class="project-content">
      <h2>Medieval Hall</h2>
      <p>Lighting-driven environment focused on mood.</p>
      <div class="links">
        <a href="pdf/medieval-breakdown.pdf" target="_blank">Breakdown</a>
      </div>
    </div>
  </section>

  <section class="project below">
    <video autoplay muted loop playsinline>
      <source src="scifi/16_meiYifan_buildVid (1).mp4" type="video/mp4" />
    </video>
    <div class="project-content">
      <h2>Sci Fi corridor</h2>
      <p>Storytelling through space and environment.</p>
    </div>
  </section>

  <section class="below">
    <div>
      <h2>Thought Process</h2>
      <p>Blockout → modular → lighting → emotion.</p>
    </div>
  </section>

</div>

<!-- VIDEO CONTROL -->
<div class="video-controls" id="controls">
  <input type="range" id="timeline" min="0" max="100" value="0">
</div>

<script>
let index = 0;
let isAnimating = false;
const sections = document.querySelectorAll("section");
const timeline = document.getElementById("timeline");
const controls = document.getElementById("controls");
let activeVideo = document.querySelector(".active video");

function updateSections() {
  sections.forEach((sec, i) => {
    sec.classList.remove("active","above","below");

    if(i < index) sec.classList.add("above");
    else if(i === index) sec.classList.add("active");
    else sec.classList.add("below");
  });

  setTimeout(() => {
    activeVideo = document.querySelector(".active video");
  }, 500);
}

window.addEventListener("wheel", (e) => {
  if(isAnimating) return;
  isAnimating = true;

  if(e.deltaY > 0) index = Math.min(index + 1, sections.length - 1);
  else index = Math.max(index - 1, 0);

  updateSections();

  setTimeout(() => { isAnimating = false; }, 1000);
});

// SHOW CONTROLS WHEN MOUSE NEAR BOTTOM
document.addEventListener("mousemove", (e) => {
  if(window.innerHeight - e.clientY < 120) {
    controls.classList.add("active");
  } else {
    controls.classList.remove("active");
  }
});

// SYNC TIMELINE
function syncTimeline() {
  if (!activeVideo || !activeVideo.duration) return;
  timeline.value = (activeVideo.currentTime / activeVideo.duration) * 100;
}
setInterval(syncTimeline, 100);

// SCRUB VIDEO
timeline.addEventListener("input", () => {
  if (!activeVideo) return;
  activeVideo.currentTime = (timeline.value / 100) * activeVideo.duration;
});

// CLICK TO PAUSE/PLAY
document.querySelectorAll("video").forEach(video => {
  video.addEventListener("click", () => {
    if(video.paused) video.play();
    else video.pause();
  });
});

</script>

</body>
</html>
